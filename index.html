        var selections = new Array(ques.length).fill(" ");
        var n = 0;

        function showQuestion(index) {
            qNum.innerHTML = index + 1;
            progress.style.width = ((index + 1) / ques.length * 100) + "%";
            que.innerHTML = ques[index].question;
            
            for (let i = 0; i < opt.length; i++) {
                opt[i].innerHTML = ques[index]["opt" + (i + 1)];
                opt[i].style.background = "#232323";
                if (selections[index] === opt[i].innerHTML) {
                    opt[i].style.background = "orange";
                }
            }
        }

        nxt.addEventListener("click", function() {
            if (n < ques.length - 1) { n++; showQuestion(n); }
            if(navigator.vibrate) navigator.vibrate(50);
        });

        prev.addEventListener("click", function() {
            if (n > 0) { n--; showQuestion(n); }
            if(navigator.vibrate) navigator.vibrate(50);
        });

        opt.forEach(button => {
            button.addEventListener("click", function() {
                selections[n] = this.innerHTML;
                opt.forEach(b => b.style.background = "#232323");
                this.style.background = "orange";
            });
        });

        document.getElementById("submit").addEventListener("click", function() {
            let correctCount = 0, attemptedCount = 0;
            selections.forEach((sel, i) => {
                if (sel !== " ") {
                    attemptedCount++;
                    if (sel === ques[i].ans) correctCount++;
                }
            });
            crct.innerHTML = correctCount;
            incrct.innerHTML = attemptedCount - correctCount;
            atmptd.innerHTML = attemptedCount;
            
            // AUTOMATIC TOTAL QUESTIONS SET KARNE KE LIYE YEH LINE ADD KI HAI
            document.getElementById("ttl").innerHTML = ques.length; 
            
            main.style.display = "none";
            resultPg.style.display = "block";
            setTimeout(() => resultPg.style.left = "0", 10);
        });

        function rplay() {
            selections.fill(" ");
            n = 0;
            showQuestion(0);
            resultPg.style.left = "100%";
            setTimeout(() => {
                resultPg.style.display = "none";
                main.style.display = "block";
            }, 500);
        }

        replay.addEventListener("click", rplay);

        start.addEventListener("click", function() {
            main.style.display = "block";
            setTimeout(() => {
                main.style.left = "0";
                firstPg.style.display = "none";
            }, 10);
            showQuestion(0);
        });

        function home() {
            firstPg.style.display = "block";
            resultPg.style.left = "100%";
            setTimeout(() => resultPg.style.display = "none", 500);
        }

        mus.addEventListener("click", function() {
            if (audio.paused) { audio.play(); mus.style.background = "#ffa"; }
            else { audio.pause(); mus.style.background = "var(--txt)"; }
        });

        mode.addEventListener("click", function() {
            if (mode.classList.contains("dark")) {
                root.style.setProperty("--mode-color", "#013");
                root.style.setProperty("--dot-color", "#308a8a");
                mode.className = "btn light";
                mode.innerHTML = "🔆";
            } else {
                root.style.setProperty("--mode-color", "#60bfbf");
                root.style.setProperty("--dot-color", "white");
                mode.className = "btn dark";
                mode.innerHTML = "🌙";
            }
        });

        setTimeout(() => {
            loadPg.style.left = "-100%";
            setTimeout(() => loadPg.style.display = "none", 500);
        }, 3000);
